spring:
  application:
    name: notification-platform
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_platform}
    username: ${DB_USER:notification_user}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: notification-platform

security:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_use_a_32+_byte_random_secret}
    expiration-ms: 3600000

notification:
  email:
    from-address: ${SES_FROM_ADDRESS:no-reply@example.com}
    aws-region: ${AWS_REGION:us-east-1}
  sms:
    from-number: ${TWILIO_FROM_NUMBER:+10000000000}
    twilio-account-sid: ${TWILIO_ACCOUNT_SID:}
    twilio-auth-token: ${TWILIO_AUTH_TOKEN:}
  push:
    firebase-credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}
  scheduler:
    poll-interval-ms: 10000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
