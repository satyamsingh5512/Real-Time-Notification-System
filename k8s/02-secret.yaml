# Placeholder Secret manifest. DO NOT commit real credential values to source control.
# In production, populate this via a secrets manager (AWS Secrets Manager + External
# Secrets Operator, Sealed Secrets, or `kubectl create secret` from a CI/CD pipeline
# with values injected from a vault) rather than checking plaintext secrets into git.
apiVersion: v1
kind: Secret
metadata:
  name: notification-platform-secrets
  namespace: notification-platform
type: Opaque
stringData:
  DB_USER: "CHANGE_ME"
  DB_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME_32_BYTE_MINIMUM_RANDOM_SECRET"
  TWILIO_ACCOUNT_SID: "CHANGE_ME"
  TWILIO_AUTH_TOKEN: "CHANGE_ME"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  # Firebase service account JSON is mounted as a separate Secret volume (see deployment.yaml)
  # rather than an env var, since it's a multi-line JSON credentials file.
