apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-platform
  namespace: notification-platform
  labels:
    app: notification-platform
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-platform
  template:
    metadata:
      labels:
        app: notification-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: notification-platform
          image: ghcr.io/your-org/notification-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: notification-platform-config
            - secretRef:
                name: notification-platform-secrets
          volumeMounts:
            - name: firebase-credentials
              mountPath: /app/secrets
              readOnly: true
          env:
            - name: FIREBASE_CREDENTIALS_PATH
              value: "file:/app/secrets/firebase-service-account.json"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
      volumes:
        - name: firebase-credentials
          secret:
            secretName: notification-platform-firebase
            optional: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: notification-platform
                topologyKey: kubernetes.io/hostname
