apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-platform-config
  namespace: notification-platform
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  DB_HOST: "postgres.notification-platform.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "notification_platform"
  REDIS_HOST: "redis.notification-platform.svc.cluster.local"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.notification-platform.svc.cluster.local:9092"
  AWS_REGION: "us-east-1"
  SES_FROM_ADDRESS: "no-reply@example.com"
  TWILIO_FROM_NUMBER: "+10000000000"
